<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Sécurisée | Gana Ousmane</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --error: #ef4444;
            --dark: #0f172a;
            --light: #f8fafc;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            background-attachment: fixed;
            overflow: hidden;
        }

        /* card entrance animation */
        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            padding: 50px 40px;
            border-radius: 20px;
            width: 380px;
            max-width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            text-align: center;
            color: #f1f5f9;
            transition: transform 0.3s ease, opacity 0.5s ease;
            animation: cardIn 0.5s ease;
        }

        h2 { margin-bottom: 30px; letter-spacing: 2px; font-weight: 600; color: var(--primary); }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(30, 41, 59, 0.5);
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            color: #f1f5f9;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        /* Validation visuelle : quand l'utilisateur écrit */
        input:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: var(--primary);
        }

        input:valid {
            border-color: var(--success);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: white;
            color: #333;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(99,102,241,0.3);
            font-size: 1rem;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 12px 30px rgba(99,102,241,0.5);
        }

        button:active {
            transform: translateY(0) scale(0.98);
        }

        #errorMessage {
            color: var(--error);
            font-size: 0.85rem;
            margin-top: 20px;
            display: none;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .success-mode {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="login-card" id="card">
        <h2>Gana Ousmane</h2>
        <form id="loginForm">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Identifiant" required>
            </div>
            <div class="input-group">
                <input type="password" id="passInput" placeholder="Mot de passe" required>
            </div>
            <button type="submit">Valider l'accès</button>
            <div id="errorMessage">⚠️ Identifiants incorrects, veuillez réessayer.</div>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const error = document.getElementById('errorMessage');
            const card = document.getElementById('card');

            // --- VALIDATION PERSONNALISÉE ---
            if (user === "GanaOusmane" && pass === "Ousmane") {
                // Succès
                error.style.display = 'none';
                card.classList.add('success-mode');
                
                // Stockage de la session
                localStorage.setItem("prestiservice_token", "active");

                // Redirection après l'animation
                setTimeout(() => {
                    window.location.href = "Gestion.html";
                }, 600);
            } else {
                // Erreur
                error.style.display = 'block';
                // Reset du formulaire
                document.getElementById('loginForm').reset();
            }
        });
    </script>
</body>
</html>
