<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestiservice Premium | Gestion Gana Ousmane</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --dark: #0f172a;
            --light: #f8fafc;
            --border: #e2e8f0;
            --text: #334155;
            --gold: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            background-attachment: fixed;
            min-height: 100vh;
            padding: 20px;
            color: #f1f5f9;
        }

        .main-container { max-width: 1200px; margin: 0 auto; }

        /* ===== EN-TÊTE ===== */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding: 30px 40px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 25px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header-left h1 {
            background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.2rem;
            font-weight: 800;
        }

        .stats {
            background: rgba(99, 102, 241, 0.2);
            color: #e0e7ff;
            padding: 12px 24px;
            border-radius: 15px;
            font-weight: 700;
        }

        /* ===== FORMULAIRE ===== */
        .form-section {
            background: rgba(15, 23, 42, 0.6);
            padding: 40px;
            border-radius: 25px;
            margin-bottom: 40px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .form-content {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 20px;
            align-items: end;
        }

        input {
            padding: 14px 18px;
            border: 2px solid rgba(148, 163, 184, 0.2);
            border-radius: 12px;
            background: rgba(30, 41, 59, 0.5);
            color: #f1f5f9;
            width: 100%;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover { background: var(--secondary); transform: translateY(-2px); }

        /* ===== LISTE ===== */
        .workers-section {
            background: rgba(15, 23, 42, 0.6);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(148, 163, 184, 0.2);
        }

        .search-bar {
            margin-bottom: 25px;
        }

        .workers-grid { display: grid; gap: 18px; }

        /* ===== CARTE TRAVAILLEUR ===== */
        .worker-card {
            display: grid;
            grid-template-columns: 1.2fr 1fr 2.5fr;
            align-items: center;
            padding: 20px;
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .worker-card:hover { background: rgba(255, 255, 255, 0.07); }

        .worker-name { font-weight: bold; font-size: 1.1rem; color: white; }
        .worker-salary { color: var(--gold); font-weight: 800; font-size: 1.1rem; }

        .worker-actions { display: flex; gap: 8px; justify-content: flex-end; }

        .btn-action {
            border: none;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: white;
            transition: 0.2s;
        }

        .btn-pay { background: var(--success); }
        .btn-withdraw { background: var(--warning); }
        .btn-history { background: #475569; }
        .btn-delete { background: var(--error); }

        .btn-action:hover { opacity: 0.8; transform: scale(1.05); }

        /* ===== MODAL ===== */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: #0f172a;
            margin: 5% auto;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 550px;
            border: 1px solid var(--primary);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .payment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .total-box {
            margin-top: 20px;
            padding: 15px;
            background: var(--primary);
            border-radius: 12px;
            color: white;
            text-align: center;
            font-weight: 800;
            font-size: 1.2rem;
        }

        /* --- STYLE IMPRESSION --- */
        #printReceipt { display: none; }

        @media print {
            body * { visibility: hidden; }
            #printReceipt, #printReceipt * { visibility: visible; }
            #printReceipt { 
                display: block !important;
                position: absolute; 
                left: 0; top: 0; width: 100%; 
                color: black !important; background: white !important; 
            }
        }

        @media (max-width: 768px) {
            .worker-card { grid-template-columns: 1fr; gap: 15px; }
            .form-content { grid-template-columns: 1fr; }
            .worker-actions { justify-content: flex-start; flex-wrap: wrap; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="header-section">
            <div class="header-left">
                <h1>🏢 Gana Ousmane Cloud</h1>
            </div>
            <div class="stats">💼 <span id="countWorkers">0</span> Employé(s)</div>
        </div>

        <div class="form-section">
            <h2 style="color: white; margin-bottom: 20px;">➕ Nouveau Travailleur</h2>
            <div class="form-content">
                <input type="text" id="nom" placeholder="Nom complet de l'employé">
                <input type="number" id="salaire" placeholder="Salaire de base (CFA)">
                <button class="btn-add" onclick="ajouterTravailleur()">ENREGISTRER</button>
            </div>
        </div>

        <div class="workers-section">
            <h2 style="color: white; margin-bottom: 20px;">📋 Liste du Personnel (Solde Actuel)</h2>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Rechercher un nom..." onkeyup="chargerDonnees()">
            </div>
            <div class="workers-grid" id="workersContainer"></div>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="modalTitle" style="color: white;">💰 Historique</h2>
                <span style="color: white; cursor: pointer; font-size: 2rem;" onclick="fermerModal()">&times;</span>
            </div>
            <div id="modalBody" style="max-height: 400px; overflow-y: auto;"></div>
            <div id="modalFooter"></div>
        </div>
    </div>

    <div id="printReceipt"></div>

    <script>
        // --- CONFIGURATION SUPABASE ---
        const SUPABASE_URL = "https://tfnfyeaizseljqbdvfsz.supabase.co";
        const SUPABASE_KEY = "sb_publishable_tulriW8uzbaWp8NMPNfC1w_VSioXkAM";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- CHARGEMENT DES DONNÉES ---
        async function chargerDonnees() {
            const search = document.getElementById('searchInput').value;
            
            // On appelle la VUE SQL qui calcule déjà le solde
            let { data: workers, error } = await supabaseClient
                .from('vue_solde_travailleurs')
                .select('*')
                .ilike('nom', `%${search}%`);

            if (error) {
                console.error("Erreur de chargement:", error);
                return;
            }

            const container = document.getElementById('workersContainer');
            container.innerHTML = '';
            document.getElementById('countWorkers').textContent = workers ? workers.length : 0;

            workers.forEach(w => {
                const card = document.createElement('div');
                card.className = 'worker-card';
                card.innerHTML = `
                    <div class="worker-name">${w.nom}</div>
                    <div class="worker-salary">${Number(w.solde_actuel).toLocaleString()} CFA</div>
                    <div class="worker-actions">
                        <button class="btn-action btn-pay" onclick="faireOperation(${w.id}, 'Versement', '${w.nom}')">Verser</button>
                        <button class="btn-action btn-withdraw" onclick="faireOperation(${w.id}, 'Retrait', '${w.nom}')">Retrait</button>
                        <button class="btn-action btn-history" onclick="voirHistorique(${w.id}, '${w.nom.replace(/'/g, "\\'")}', ${w.salaire_base})">Historique</button>
                        <button class="btn-action btn-delete" onclick="supprimer(${w.id})">Suppr.</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // --- AJOUTER UN TRAVAILLEUR ---
        async function ajouterTravailleur() {
            const nom = document.getElementById('nom').value;
            const salaire = document.getElementById('salaire').value;
            if(!nom || !salaire) { alert("Veuillez remplir tous les champs"); return; }

            const { error } = await supabaseClient
                .from('workers')
                .insert([{ id: Date.now(), nom: nom, salaire_base: parseFloat(salaire) }]);

            if(!error) {
                document.getElementById('nom').value = '';
                document.getElementById('salaire').value = '';
                chargerDonnees();
            } else {
                alert("Erreur lors de l'ajout.");
            }
        }

        // --- VERSEMENT OU RETRAIT ---
        async function faireOperation(workerId, type, nomWorker) {
            let montantSaisi = prompt(`Montant du ${type} pour ${nomWorker} :`, type === 'Versement' ? "75000" : "");
            if (!montantSaisi || montantSaisi === "") return;

            let montant = parseFloat(montantSaisi);
            if (isNaN(montant) || montant <= 0) { alert("Montant invalide"); return; }
            
            // Retrait = Montant négatif en base de données
            let montantFinal = type === 'Retrait' ? -montant : montant;

            const { error } = await supabaseClient
                .from('transactions')
                .insert([{ 
                    worker_id: workerId, 
                    montant: montantFinal, 
                    type_label: type 
                }]);

            if(!error) {
                alert(`${type} enregistré avec succès !`);
                chargerDonnees();
            }
        }

      // --- HISTORIQUE DÉTAILLÉ (MODIFIÉ) ---
async function voirHistorique(workerId, nom, salaireBase) {
    const { data: trans, error } = await supabaseClient
        .from('transactions')
        .select('*')
        .eq('worker_id', workerId)
        .order('date_operation', { ascending: true }); // On trie par date pour calculer le solde

    const modal = document.getElementById('paymentModal');
    const body = document.getElementById('modalBody');
    const footer = document.getElementById('modalFooter');
    document.getElementById('modalTitle').textContent = nom;

    let html = `<p style="color:#94a3b8; margin-bottom:15px;">Salaire de base initial : ${salaireBase.toLocaleString()} CFA</p>`;
    let soldeCumule = salaireBase;
    let itemsHTML = [];

    if(!trans || trans.length === 0) {
        html += '<p style="text-align:center; padding:20px;">Aucune opération enregistrée.</p>';
    } else {
        trans.forEach(t => {
            soldeCumule += t.montant; // Calcul du solde après cette opération
            const dateF = new Date(t.date_operation).toLocaleDateString('fr-FR', {day:'numeric', month:'short', year:'numeric'});
            const isNeg = t.montant < 0;
            
            // On stocke chaque ligne. On utilise unshift pour que le plus récent soit en haut de la liste
            itemsHTML.unshift(`
                <div class="payment-item">
                    <div>
                        <div style="font-weight:bold; color:white;">${t.type_label}</div>
                        <div style="font-size:0.8rem; color:#94a3b8;">${dateF}</div>
                    </div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-weight:800; color:${isNeg ? '#ef4444' : '#10b981'}">
                            ${isNeg ? '' : '+'}${t.montant.toLocaleString()} CFA
                        </span>
                        <button onclick="imprimerRecu('${nom.replace(/'/g, "\\'")}', '${t.type_label}', '${dateF}', ${Math.abs(t.montant)}, ${soldeCumule})" style="background:none; border:none; cursor:pointer; font-size:1.2rem;">🖨️</button>
                    </div>
                </div>
            `);
        });
        html += itemsHTML.join('');
    }

    body.innerHTML = html;
    footer.innerHTML = `<div class="total-box">SOLDE ACTUEL : ${soldeCumule.toLocaleString()} CFA</div>`;
    modal.style.display = 'block';
}
       // --- IMPRESSION DE REÇU (MODIFIÉ) ---
function imprimerRecu(nom, type, date, montant, soldeRestant) {
    const zone = document.getElementById('printReceipt');
    zone.innerHTML = `
        <div style="font-family: 'Courier New', Courier, monospace; border: 2px dashed #000; padding: 30px; width: 500px; margin: 20px auto; background: white; color: black;">
            <h2 style="text-align: center; margin: 0;">GANA OUSMANE CLOUD</h2>
            <p style="text-align: center; border-bottom: 1px solid #000; padding-bottom: 10px; margin-bottom: 20px;">REÇU DE PAIEMENT</p>
            
            <div style="line-height: 1.8; font-size: 16px;">
                <p><strong>BÉNÉFICIAIRE :</strong> ${nom.toUpperCase()}</p>
                <p><strong>DATE :</strong> ${date}</p>
                <p><strong>NATURE :</strong> ${type.toUpperCase()}</p>
                <hr>
                <p style="font-size: 20px;"><strong>MONTANT : ${montant.toLocaleString()} CFA</strong></p>
                <p style="font-size: 18px; margin-top: 10px; border: 1px solid #000; padding: 5px; display: inline-block;">
                    <strong>SOLDE RESTANT : ${soldeRestant.toLocaleString()} CFA</strong>
                </p>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 40px; font-size: 14px;">
                <div style="text-align: center;">
                    <p>Signature Employé</p>
                    <div style="height: 40px;"></div>
                </div>
                <div style="text-align: center;">
                    <p>Le Gestionnaire</p>
                    <div style="height: 40px;"></div>
                </div>
            </div>
            <p style="text-align: center; font-size: 10px; margin-top: 30px;">Généré par Prestiservice Premium</p>
        </div>
    `;
    window.print();
}
        function supprimer(id) {
            if(confirm("⚠️ Supprimer définitivement ce travailleur ? Cette action effacera aussi tout son historique.")) {
                supabaseClient.from('workers').delete().eq('id', id).then(() => chargerDonnees());
            }
        }

        function fermerModal() { document.getElementById('paymentModal').style.display = 'none'; }
        
        // Lancer le chargement au démarrage
        chargerDonnees();
    </script>
</body>
</html>
